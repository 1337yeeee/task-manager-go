<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Task Manager</title>
    <link rel="stylesheet" href="css/style.css?id=11" />

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
</head>
<body>

<div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>Projects</h2>
            <button id="newProjectBtn" class="btn primary">New Project</button>
        </div>

        <ul class="project-list">
        </ul>

        <div class="sidebar-footer">
            <button id="profileBtn" class="btn">Profile</button>
            <button id="logoutBtn" class="btn">Logout</button>
        </div>
    </aside>

    <!-- Main -->
    <main class="main">

        <!-- Header -->
        <div class="main-header">
            <h1>Project Alpha</h1>
            <button id="newTaskBtn" class="btn primary">+ Task</button>
        </div>

        <div class="desc-header">
            <p>Description of the project Alpha</p>
        </div>

        <!-- Board -->
        <div class="board">

            <!-- Column -->
            <div class="column" id="created">
                <h3>Created</h3>
                <div class="task-list" data-status-id="created"></div>
            </div>

            <!-- Column -->
            <div class="column" id="in_progress">
                <h3>In Progress</h3>
                <div class="task-list" data-status-id="in_progress"></div>
            </div>

            <!-- Column -->
            <div class="column" id="done">
                <h3>Done</h3>
                <div class="task-list" data-status-id="done"></div>
            </div>

        </div>
    </main>
</div>

<!-- Create Project Modal -->
<div id="createProjectModal" class="modal hidden">
    <div class="modal-content">
        <h2>Create Project</h2>
        <input id="projectNameInput" type="text" placeholder="Name" />
        <textarea id="projectDescInput" placeholder="Description"></textarea>
        <button id="saveProjectBtn" class="btn primary">Save</button>
        <div id="createProjectError"></div>
    </div>
</div>

<!-- Create Task Modal -->
<div id ="createTaskModal" class="modal hidden">
    <div class="modal-content">
        <h2>Create Task</h2>
        <input id="taskNameInput" type="text" placeholder="Name" />
        <textarea id="taskContentInput" placeholder="Content"></textarea>

<!--        <label>Executive</label>-->
<!--        <select>-->
<!--            <option>User1</option>-->
<!--        </select>-->

<!--        <label>Auditor</label>-->
<!--        <select>-->
<!--            <option>User2</option>-->
<!--        </select>-->

        <button id="saveTaskBtn" class="btn primary">Create</button>
        <div id="createTaskError"></div>
    </div>
</div>

<script src="js/auth.js?q=12"></script>
<script src="js/api.js?q=12"></script>
<script src="js/dashboard.js?q=12"></script>

</body>
</html>
