basePath: /
definitions:
  handler.ErrorResponse:
    properties:
      error:
        example: invalid credentials
        type: string
    type: object
  handler.OkResponse:
    properties:
      ok:
        example: true
        type: boolean
    type: object
  handler.ProjectDataResponse:
    properties:
      data:
        $ref: '#/definitions/handler.ProjectResponse'
    type: object
  handler.ProjectResponse:
    properties:
      created_at:
        example: "2026-04-02T12:00:00Z"
        type: string
      created_by:
        example: d290f1ee-6c54-4b01-90e6-d701748f0851
        type: string
      desc:
        example: Backend service for task management
        type: string
      id:
        example: 7c3d9d0a-8dcb-4f7f-9b5e-2a12d4e9a001
        type: string
      name:
        example: Task Manager
        type: string
      updated_at:
        example: "2026-04-02T12:30:00Z"
        type: string
      updated_by:
        example: d290f1ee-6c54-4b01-90e6-d701748f0851
        type: string
    type: object
  handler.ProjectsDataResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/handler.ProjectResponse'
        type: array
    type: object
  handler.SuccessResponse:
    properties:
      data:
        example: true
        type: boolean
    type: object
  handler.TaskDataResponse:
    properties:
      data:
        $ref: '#/definitions/handler.TaskResponse'
    type: object
  handler.TaskResponse:
    properties:
      auditor_id:
        example: a1f8c8d4-7b2a-4b10-bf18-1d3dcb6f9a77
        type: string
      content:
        example: Add access and refresh token support
        type: string
      created_at:
        example: "2026-04-02T12:00:00Z"
        type: string
      created_by:
        example: d290f1ee-6c54-4b01-90e6-d701748f0851
        type: string
      executive_id:
        example: d290f1ee-6c54-4b01-90e6-d701748f0851
        type: string
      id:
        example: 7c3d9d0a-8dcb-4f7f-9b5e-2a12d4e9a010
        type: string
      name:
        example: Implement JWT auth
        type: string
      project_id:
        example: 7c3d9d0a-8dcb-4f7f-9b5e-2a12d4e9a001
        type: string
      status:
        example: created
        type: string
      updated_at:
        example: "2026-04-02T12:30:00Z"
        type: string
      updated_by:
        example: d290f1ee-6c54-4b01-90e6-d701748f0851
        type: string
    type: object
  handler.TasksListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/handler.TaskResponse'
        type: array
    type: object
  handler.TokenResponse:
    properties:
      access_token:
        example: jwt-access-token
        type: string
      refresh_token:
        example: jwt-refresh-token
        type: string
      token_type:
        example: Bearer
        type: string
    type: object
  handler.UserDataResponse:
    properties:
      user:
        $ref: '#/definitions/handler.UserResponse'
    type: object
  handler.UserResponse:
    properties:
      created_at:
        example: "2026-04-02T12:00:00Z"
        type: string
      email:
        example: john@example.com
        type: string
      id:
        example: 7c3d9d0a-8dcb-4f7f-9b5e-2a12d4e9a001
        type: string
      name:
        example: John Doe
        type: string
      role:
        enum:
        - admin
        - viewer
        - editor
        example: viewer
        type: string
      updated_at:
        example: "2026-04-02T12:30:00Z"
        type: string
    type: object
  handler.UsersDataResponse:
    properties:
      users:
        items:
          $ref: '#/definitions/handler.UserResponse'
        type: array
    type: object
  handler.createProjectRequest:
    properties:
      desc:
        example: Backend service for task management
        type: string
      name:
        example: Task Manager
        type: string
    required:
    - name
    type: object
  handler.loginRequest:
    properties:
      email:
        example: user@mail.com
        type: string
      password:
        example: password123
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  handler.registerUserRequest:
    properties:
      email:
        example: john@example.com
        type: string
      name:
        example: John Doe
        type: string
      password:
        example: strongpassword123
        type: string
      role:
        example: viewer
        type: string
    required:
    - email
    - name
    - password
    type: object
  handler.taskCreateRequest:
    properties:
      content:
        example: Add access and refresh token support
        type: string
      name:
        example: Implement JWT auth
        type: string
    required:
    - content
    - name
    type: object
  handler.taskUpdateRequest:
    properties:
      auditor_id:
        example: a1f8c8d4-7b2a-4b10-bf18-1d3dcb6f9a77
        type: string
      content:
        example: Update business logic and tests
        type: string
      executive_id:
        example: d290f1ee-6c54-4b01-90e6-d701748f0851
        type: string
      name:
        example: Implement JWT authentication
        type: string
    type: object
  handler.taskUpdateStatusRequest:
    properties:
      status:
        example: in_progress
        type: string
    required:
    - status
    type: object
  handler.updateProjectRequest:
    properties:
      desc:
        example: Updated project description
        type: string
      name:
        example: Task Manager API
        type: string
    type: object
  handler.updateUserRequest:
    properties:
      email:
        example: john.smith@example.com
        type: string
      name:
        example: John Smith
        type: string
      password:
        example: newstrongpassword123
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API for task manager
  title: Task Manager API
  version: "1.0"
paths:
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and return access + refresh tokens
      parameters:
      - description: Login credentials
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/handler.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.TokenResponse'
        "400":
          description: validation error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: invalid credentials
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Login user
      tags:
      - auth
  /api/logout:
    post:
      description: Requires access token. Invalidates session/token.
      produces:
      - application/json
      responses:
        "200":
          description: empty response
          schema:
            additionalProperties: true
            type: object
        "401":
          description: unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Logout user
      tags:
      - auth
  /api/refresh:
    post:
      consumes:
      - application/json
      description: Requires refresh token in Authorization header (Bearer). Returns
        new token pair.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.TokenResponse'
        "401":
          description: invalid or missing refresh token
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Refresh tokens
      tags:
      - auth
  /projects/:
    get:
      description: Returns all projects available to the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.ProjectsDataResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get all projects
      tags:
      - projects
    post:
      consumes:
      - application/json
      description: Creates a new project. Requires access token and moderator/editor/admin
        permissions according to middleware.
      parameters:
      - description: Project payload
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/handler.createProjectRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.ProjectDataResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create project
      tags:
      - projects
  /projects/{id}:
    delete:
      description: Deletes a project by its identifier
      parameters:
      - description: Project ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.SuccessResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete project
      tags:
      - projects
    get:
      description: Returns a project by its identifier
      parameters:
      - description: Project ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.ProjectDataResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get project by ID
      tags:
      - projects
    put:
      consumes:
      - application/json
      description: Updates a project. Current implementation expects project id in
        request body.
      parameters:
      - description: Project ID from route
        in: path
        name: id
        required: true
        type: string
      - description: Project update payload
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/handler.updateProjectRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.ProjectDataResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update project
      tags:
      - projects
  /projects/{id}/tasks:
    get:
      description: Returns all tasks for a specific project
      parameters:
      - description: Project ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.TasksListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get tasks by project
      tags:
      - tasks
    post:
      consumes:
      - application/json
      description: Creates a task for the specified project
      parameters:
      - description: Project ID
        in: path
        name: id
        required: true
        type: string
      - description: Task create payload
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/handler.taskCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.TaskDataResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create task in project
      tags:
      - tasks
  /tasks/{id}:
    delete:
      description: Deletes task by identifier
      parameters:
      - description: Task ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.OkResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete task
      tags:
      - tasks
    get:
      description: Returns task by identifier
      parameters:
      - description: Task ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.TaskDataResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get task by ID
      tags:
      - tasks
    put:
      consumes:
      - application/json
      description: Updates task fields by identifier
      parameters:
      - description: Task ID
        in: path
        name: id
        required: true
        type: string
      - description: Task update payload
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/handler.taskUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.OkResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update task
      tags:
      - tasks
  /tasks/{id}/status:
    patch:
      consumes:
      - application/json
      description: Updates task status by identifier
      parameters:
      - description: Task ID
        in: path
        name: id
        required: true
        type: string
      - description: Task status payload
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/handler.taskUpdateStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.OkResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update task status
      tags:
      - tasks
  /users/:
    get:
      description: Returns all users. Endpoint is available only for admin according
        to route middleware.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.UsersDataResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get all users
      tags:
      - users
    post:
      consumes:
      - application/json
      description: Creates a new user. Endpoint is available only for admin according
        to route middleware.
      parameters:
      - description: User register payload
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/handler.registerUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.UserDataResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Register user
      tags:
      - users
  /users/{id}:
    delete:
      description: Deletes user by identifier. Endpoint is available only for admin
        according to route middleware.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.OkResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete user
      tags:
      - users
    get:
      description: Returns user by identifier. Endpoint is available only for admin
        according to route middleware.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.UserDataResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get user by ID
      tags:
      - users
    put:
      consumes:
      - application/json
      description: Updates user fields. Current implementation expects user id in
        request body.
      parameters:
      - description: User ID from route
        in: path
        name: id
        required: true
        type: string
      - description: User update payload
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/handler.updateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.UserDataResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update user
      tags:
      - users
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
